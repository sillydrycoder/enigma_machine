<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enigma Machine</title>
  <link href="https://bootswatch.com/5/lux/bootstrap.css" rel="stylesheet">
  <script>
    // WebSocket connection on /ws
    const ws = new WebSocket(`ws://${window.location.host}/ws`);

    ws.onopen = () => {
      console.log("WebSocket connected");
    };

    ws.onclose = () => {
      console.log("WebSocket disconnected");
    };

    ws.onmessage = (event) => {
      const message = JSON.parse(event.data);
      showReceivedMessage(message.message);
    };

    function sendMessage(event) {
      event.preventDefault();
      const messageInput = document.getElementById('message');
      const message = messageInput.value;

      ws.send(JSON.stringify({
        message
      }));

      showSentMessage(message);
      messageInput.value = '';
    }

    function showSentMessage(message) {
      const container = document.getElementById('message-container');
      const messageElement = document.createElement('div');
      messageElement.classList.add('d-flex', 'justify-content-end');
      messageElement.innerHTML = `
        <div class="card text-white bg-success mb-1 p-2" style="max-width: 80%;">
          <div class="card-body m-0 p-0">
            <p class="card-text p-0 m-0" style="font-size: large;">${message}</p>
            <p class="card-text p-0 m-0" style="font-size: small;">${new Date().toLocaleString()}</p>
          </div>
        </div>
      `;
      container.appendChild(messageElement);
      container.scrollTop = container.scrollHeight;
    }

    function showReceivedMessage(message) {
      const container = document.querySelector('.container-fluid');
      const messageElement = document.createElement('div');
      messageElement.classList.add('d-flex', 'justify-content-start');
      messageElement.innerHTML = `
        <div class="card text-white bg-info p-0 mb-1 p-2" style="max-width: 80%;">
          <div class="card-body m-0 p-0">
            <p class="card-text p-0 m-0" style="font-size: large;">${message}</p>
            <p class="card-text p-0 m-0 text-end" style="font-size: small;">${new Date().toLocaleString()}</p>
          </div>
        </div>
      `;
      container.appendChild(messageElement);
      container.scrollTop = container.scrollHeight;
    }
  </script>
  <style>
    #message-box {
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      bottom: 0;
      width: 100%;
      box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.1);
    }

    #message {
      flex-grow: 1;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-success p-2">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bolder" href="#">Enigma Machine</a>
    </div>
  </nav>
  <div class="container-fluid p-2" id="message-container">
    <div class="d-flex justify-content-end">
      <div class="card text-white bg-success mb-1 p-2" style="max-width: 80%;">
        <div class="card-body m-0 p-0">
          <p class="card-text p-0 m-0" style="font-size: large;">This is the sent message.</p>
          <p class="card-text p-0 m-0" style="font-size: small;">22 Sug, 2024, 3:22pm</p>
        </div>
      </div>
    </div>
    <div class="d-flex justify-content-start">
      <div class="card text-white bg-info p-0 mb-1 p-2" style="max-width: 80%;">
        <div class="card-body m-0 p-0">
          <p class="card-text p-0 m-0" style="font-size: large;">This is the received message.</p>
          <p class="card-text p-0 m-0 text-end" style="font-size: small;">22 Sug, 2024, 3:22pm</p>
        </div>
      </div>
    </div>
  </div>

  <div id="message-box">
    <form onsubmit="sendMessage(event)" class="d-flex w-100">
      <input type="text" class="form-control border-top border-primary" id="message" placeholder="Type your message here" required>
      <button type="submit" class="btn btn-success border border-primary">Send</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
